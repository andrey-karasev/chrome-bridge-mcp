name: Trigger install rebuild

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild to Web4w3/install
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Web4w3/install/dispatches \
            -d '{"event_type":"rebuild","client_payload":{"mcp":"chrome-bridge"}}'
