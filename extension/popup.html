<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #f5f5f5;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot.connected { background: #4CAF50; }
    .dot.disconnected { background: #F44336; }
    .info {
      margin-top: 12px;
      color: #666;
      font-size: 11px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Claude Chrome Bridge</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Checking...</span>
  </div>
  <div class="info">
    Connects to the MCP server on <code>ws://localhost:9229</code>.<br>
    Start the server with <code>npm start</code> in the chrome-bridge directory.
  </div>
  <script src="scripts/popup.js"></script>
</body>
</html>
